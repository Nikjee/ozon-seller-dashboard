name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            extension: ""
            platform-key: linux-x86_64
            # For the updater: use the AppImage installer + its .sig
            updater-sig-glob: src-tauri/target/release/bundle/appimage/*.AppImage.sig
            updater-bundle-glob: src-tauri/target/release/bundle/appimage/*.AppImage
            installer-glob: src-tauri/target/release/bundle/**/*.deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            extension: .exe
            platform-key: windows-x86_64
            # For the updater: use the NSIS installer + its .sig
            updater-sig-glob: src-tauri/target/release/bundle/nsis/*.exe.sig
            installer-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            extension: ""
            platform-key: darwin-aarch64
            # macOS generates updater artifacts natively in macos/ dir
            updater-sig-glob: src-tauri/target/release/bundle/macos/*.tar.gz.sig
            updater-bundle-glob: src-tauri/target/release/bundle/macos/*.tar.gz
            installer-glob: src-tauri/target/release/bundle/**/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: npm install
        run: npm install

      - name: Build with Tauri
        run: npx @tauri-apps/cli@^2 build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_TOKEN: ${{ secrets.TAURI_UPDATER_TOKEN }}

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-bin
          path: src-tauri/target/release/ozon-dashboard${{ matrix.extension }}
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-installer
          path: ${{ matrix.installer-glob }}
          if-no-files-found: ignore

      - name: Upload updater signature
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-updater
          path: ${{ matrix.updater-sig-glob }}
          if-no-files-found: error

      - name: Upload updater bundle (macOS / Linux)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-updater-bundle
          path: ${{ matrix.updater-bundle-glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${{ github.ref_name }}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          REPO="${{ github.repository }}"

          platforms='{}'
          for dir in artifacts/*-updater/; do
            [ -d "$dir" ] || continue
            key="${dir#artifacts/}"
            key="${key%-updater/}"

            # Read .sig file
            sig_file=$(find "$dir" -name '*.sig' | head -1)
            [ -z "$sig_file" ] && echo "  [warn] No .sig in $dir" >&2 && continue
            sig=$(tr -d '\n\r' < "$sig_file")

            # Construct the installer/updater URL based on platform
            case "$key" in
              linux-x86_64)
                installer_name="ozon-dashboard_${VERSION}_amd64.AppImage"
                ;;
              windows-x86_64)
                installer_name="ozon-dashboard_${VERSION}_x64-setup.exe"
                ;;
              darwin-aarch64)
                installer_name="ozon-dashboard.app.tar.gz"
                ;;
              *)
                echo "  [warn] Unknown platform: $key" >&2
                continue
                ;;
            esac

            url="https://github.com/${REPO}/releases/download/${TAG}/${installer_name}"
            platforms=$(echo "$platforms" | jq \
              --arg k "$key" \
              --arg sig "$sig" \
              --arg url "$url" \
              '. + {($k): {signature: $sig, url: $url}}')
          done

          jq -n \
            --arg version "$VERSION" \
            --arg notes "https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$platforms" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: $platforms
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json

      - name: Replace latest.json with API URLs + commit to repo
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Fetch release info to get asset IDs
          echo "Fetching release info for $TAG..."
          gh api "repos/${REPO}/releases/tags/${TAG}" > /tmp/release.json

          # Determine the updater asset names per platform
          VERSION="${TAG#v}"

          declare -A PLATFORM_ASSETS
          PLATFORM_ASSETS[darwin-aarch64]="ozon-dashboard.app.tar.gz"
          PLATFORM_ASSETS[linux-x86_64]="ozon-dashboard_${VERSION}_amd64.AppImage"
          PLATFORM_ASSETS[windows-x86_64]="ozon-dashboard_${VERSION}_x64-setup.exe"

          # Build the platforms object with API URLs
          platforms='{}'
          found_any=false
          for key in "${!PLATFORM_ASSETS[@]}"; do
            asset_name="${PLATFORM_ASSETS[$key]}"
            echo "  Looking for asset: $asset_name"

            # Find the asset ID by name
            asset_id=$(cat /tmp/release.json | jq -r \
              --arg name "$asset_name" \
              '.assets[] | select(.name == $name) | .id')

            if [ -z "$asset_id" ] || [ "$asset_id" = "null" ]; then
              echo "  [warn] Asset not found: $asset_name" >&2
              continue
            fi
            echo "  Asset ID: $asset_id"

            # Find matching .sig in artifacts
            sig_file=$(find artifacts/${key}-updater/ -name '*.sig' 2>/dev/null | head -1)
            if [ -z "$sig_file" ]; then
              echo "  [warn] No .sig found for $key" >&2
              continue
            fi
            sig=$(tr -d '\n\r' < "$sig_file")

            api_url="https://api.github.com/repos/${REPO}/releases/assets/${asset_id}"
            platforms=$(echo "$platforms" | jq \
              --arg k "$key" \
              --arg sig "$sig" \
              --arg url "$api_url" \
              '. + {($k): {signature: $sig, url: $url}}')
            found_any=true
          done

          if [ "$found_any" = "false" ]; then
            echo "ERROR: no platform assets found, aborting" >&2
            exit 1
          fi

          # Generate API-URL version of latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg pub_date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --argjson platforms "$platforms" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: $platforms
            }' > latest.json

          echo "=== Updated latest.json (API URLs) ==="
          cat latest.json

          # Replace the existing latest.json asset on the release
          echo "Deleting old latest.json asset..."
          old_id=$(cat /tmp/release.json | jq -r '.assets[] | select(.name == "latest.json") | .id')
          if [ -n "$old_id" ] && [ "$old_id" != "null" ]; then
            gh api -X DELETE "repos/${REPO}/releases/assets/${old_id}"
            echo "  Deleted old asset ID $old_id"
          fi

          echo "Uploading new latest.json..."
          gh release upload "${TAG}" latest.json --clobber -R "${REPO}"
          echo "  Uploaded"

          # Commit latest.json to the repo
          echo "Committing latest.json to main..."
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Note: we're on detached HEAD (tag checkout), so push HEAD explicitly
          git add latest.json
          git diff --cached --quiet && echo "No changes to latest.json" || {
            git commit -m "Update latest.json for ${TAG} [skip ci]"
            git fetch origin main && git rebase -X theirs origin/main
            git push origin HEAD:main
            echo "  Committed and pushed"
          }
          echo "Done"
