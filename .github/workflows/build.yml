name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            extension: ""
            platform-key: linux-x86_64
            # For the updater: use the AppImage installer + its .sig
            updater-sig-glob: src-tauri/target/release/bundle/appimage/*.AppImage.sig
            installer-glob: src-tauri/target/release/bundle/**/*.deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            extension: .exe
            platform-key: windows-x86_64
            # For the updater: use the NSIS installer + its .sig
            updater-sig-glob: src-tauri/target/release/bundle/nsis/*.exe.sig
            installer-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            extension: ""
            platform-key: darwin-aarch64
            # macOS generates updater artifacts natively in macos/ dir
            updater-sig-glob: src-tauri/target/release/bundle/macos/*.tar.gz.sig
            updater-bundle-glob: src-tauri/target/release/bundle/macos/*.tar.gz
            installer-glob: src-tauri/target/release/bundle/**/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: npm install
        run: npm install

      - name: Build with Tauri
        run: npx @tauri-apps/cli@^2 build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-bin
          path: src-tauri/target/release/ozon-dashboard${{ matrix.extension }}
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-installer
          path: ${{ matrix.installer-glob }}
          if-no-files-found: ignore

      - name: Upload updater signature
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-updater
          path: ${{ matrix.updater-sig-glob }}
          if-no-files-found: error

      - name: Upload updater bundle (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-key }}-updater-bundle
          path: ${{ matrix.updater-bundle-glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${{ github.ref_name }}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          REPO="${{ github.repository }}"

          platforms='{}'
          for dir in artifacts/*-updater/; do
            [ -d "$dir" ] || continue
            key="${dir#artifacts/}"
            key="${key%-updater/}"

            # Read .sig file
            sig_file=$(find "$dir" -name '*.sig' | head -1)
            [ -z "$sig_file" ] && echo "  [warn] No .sig in $dir" >&2 && continue
            sig=$(tr -d '\n\r' < "$sig_file")

            # Construct the installer/updater URL based on platform
            case "$key" in
              linux-x86_64)
                installer_name="ozon-dashboard_${VERSION}_amd64.AppImage"
                ;;
              windows-x86_64)
                installer_name="ozon-dashboard_${VERSION}_x64-setup.exe"
                ;;
              darwin-aarch64)
                installer_name="ozon-dashboard.app.tar.gz"
                ;;
              *)
                echo "  [warn] Unknown platform: $key" >&2
                continue
                ;;
            esac

            url="https://github.com/${REPO}/releases/download/${TAG}/${installer_name}"
            platforms=$(echo "$platforms" | jq \
              --arg k "$key" \
              --arg sig "$sig" \
              --arg url "$url" \
              '. + {($k): {signature: $sig, url: $url}}')
          done

          jq -n \
            --arg version "$VERSION" \
            --arg notes "https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$platforms" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: $platforms
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
