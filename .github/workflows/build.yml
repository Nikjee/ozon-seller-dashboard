name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            extension: ""
            portable-name: ozon-dashboard-linux-x86_64
            installer-glob: src-tauri/target/release/bundle/**/*.deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            extension: .exe
            portable-name: ozon-dashboard-windows-x86_64
            installer-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            extension: ""
            portable-name: ozon-dashboard-macos-arm64
            installer-glob: src-tauri/target/release/bundle/**/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: npm install
        run: npm install

      - name: Build with Tauri
        run: npx @tauri-apps/cli@^2 build

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.portable-name }}
          path: src-tauri/target/release/ozon-dashboard${{ matrix.extension }}
          if-no-files-found: error

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.portable-name }}-installers
          path: ${{ matrix.installer-glob }}
          if-no-files-found: ignore
